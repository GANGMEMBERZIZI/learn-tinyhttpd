<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>tinyhttpd – Home</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1   { color: #333; }
    form { margin-top: 20px; }
    input[type=text] { padding: 6px; width: 300px; }
    input[type=submit] { padding: 6px 16px; margin-left: 8px; cursor: pointer; }
    a    { color: #0066cc; }
  </style>
</head>
<body>
  <h1>Welcome to tinyhttpd</h1>
  <p>A tiny HTTP server written in C for learning purposes.</p>

  <h2>CGI demo – colour lookup</h2>
  <form method="GET" action="/cgi-bin/color.cgi">
    <label>Enter a colour name:
      <input type="text" name="color" placeholder="e.g. red">
    </label>
    <input type="submit" value="Look up">
  </form>

  <h2>POST demo – echo form</h2>
  <form method="POST" action="/cgi-bin/echo.cgi">
    <label>Your message:
      <input type="text" name="msg" placeholder="Hello, world!">
    </label>
    <input type="submit" value="Send">
  </form>

  <hr>
  <p><small>tinyhttpd/0.1.0</small></p>
</body>
</html>
